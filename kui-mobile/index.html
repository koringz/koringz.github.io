<!-- 
        最外层div容器表示布局位置的类.kui-form-pos
        form表单的类是布局美观的类.kui-box-form-content
        .kui-input-txt表示改变输入框内容的input[type='text']类，可以自动添加新类即可修改固定框架的类
        定义浮动的类为.kui-input-lrt .kui-input-lft
        不可在一个填充容器内部自定义布局3个input元素，但是可以定义1个

        添加按钮 === 请复制一个p标签，然后粘贴到和p同级别下，之后添加一个类.kui-input-width。
        如果想改变按钮和文本框的宽和高，直接给按钮添加新类即可
          -->
