<html>  
<head>  
    <meta charset='utf-8'>
    <title>测试算法</title>
    <meta name="viewport" content="width=device-width, minimum-scale=1, initial-scale=1, user-scalable=yes">
    <style>

        body{
            margin: 0;
            padding: 0;
        }

        .main{
            padding: 16px;
        }

        .top{
            text-align: center;
            color: slategrey;
            margin: -16px;
            padding: 50px 32px;
            background-color:  #2f2f2f;
            vertical-align: middle;
        }

        .container{
            margin: auto;
            padding: -1px;
            width: 380px ;
            padding: 160px 2px;
            border: 1px solid #555;
            -webkit-border-radius: 10%;
            -moz-border-radius: 10%;
            -ms-border-radius: 10%;
            border-radius: 10%;
            /*background-color: green*/
        }

        /* --- */

        .enter-box{
            position: relative;
            display: inline-block;
            width: 60%;
            padding: 10px 8px;
            background-color: white;
            vertical-align: middle;
            -webkit-border-radius: 5px;
            -moz-border-radius: 5px;
            -ms-border-radius: 5px;
            border-radius: 5px;
        }

        #ipt{
            width: 100%;
            line-height: 30px;
            border: none;
            outline: none;
            font: 16px Microsoft YaHei, Arial, Helvetica;
        }

        /* --- */

        #fontAlgo{
            margin: 50px auto 0;
            padding: 10px;
            height: 130px;
            width: 60%;
            background-color: cadetblue;
            cursor: pointer;
            -webkit-border-radius: 10px;
            -moz-border-radius: 10px;
            -ms-border-radius: 10px;
            border-radius: 10px;
            color: #eee;
            text-align: center;
            overflow: hidden;
        }

        .git-Source{
            text-align: right;
        }

        .git-Source a{
            color: #888
        }

        @media(max-width: 767px) {
            .top,
            .main,
            .container,
            #fontAlgo{
                margin: 0;
                padding: 0;
             }
            .container{
                padding: 30px 0;
                width: 100%;
                border: none;
             }

            #fontAlgo{
                width: 100%;
             }
             #ipt,
             .enter-box{
                width: 100%;
             }

        }

    </style>
</head>  
<body>
<div class=" main">
    <div class="top">
        <div class="container">

            <!--  -->

                <div class="enter-box">
                    <input type='text' value='' placeholder="必须带有空格的一句话...." id="ipt"> 
                </div>
                
                <p color='#ccc'>输入之后点 ↓ 或回车键(Enter)</p>
                
                <div id="fontAlgo"></div>

            <!--  -->

        </div>
        <div class="git-Source"><a href="https://github.com/ZWLTZ/Reserve-order-algorithm">get resouce</a></div>
    </div>
</div>
 <script src="./test_repeat.js"></script>
 <script> 

// this is the default call enter value.
var userContent = document.querySelector('#ipt').value,
    node = document.querySelector('#fontAlgo');


// when the input changes call the method.
document.querySelector('#ipt').onchange = function  () {

    // node.innerText = Conversion().access(this.value).getContainer(true);
    var val = Conversion().access({value : this.value}).getContainer(true);
    node.innerText = val;

}

</script>
</body>
</html>
