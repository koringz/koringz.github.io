<html>  
<head>  
    <meta charset='utf-8'>
    <title>s3.JS</title>
    <meta name="viewport" content="width=device-width, minimum-scale=1, initial-scale=1, user-scalable=yes">

    <link rel="stylesheet" type="text/css" href="./assets/public.css">
    <style type="text/css">.bgwhite{background-color: white}.bgred{background-color: white}#mid{width:960px;margin:0 auto;text-align: left;padding: 5px}.header{text-align: center;}#clear{clear:both;margin-top:8px;padding: 0;}.active{color:gray;}</style>
 <script src="./S3/S3.js"></script>
</head>  
<body>
<div class=" main">
	<div id="mid"> <span>alone:</span>
		<button data-model="circle">circle</button>
		<button data-model="line">line</button>
		<button data-model="arc">arc</button>
		<button data-model="rect">rect</button>
		<button data-model="wave">wave</button>
		<button data-model="sectors">sectors</button>
		<button data-model="hat">hat</button>
		<div id="clear"></div>
		 <span>group:</span>
		<button data-model="arcAndCircle">arc+circle</button>
		<button data-model="rectAndline">rect+line</button>
		<button data-model="circleAndsectors">circle+sectors</button>
		<button data-model="lineAndsectors">line+sectors</button>
		<button data-model="waveAndcircle">wave+circle</button>
		<button data-model="rectAndcircle">rect+circle</button>
		<!-- <button data-model="arcAndline">line+arc</button> -->
		<button data-model="lineAndcircle">circle+line</button>
		<div id="clear"></div>
		 <span>multiple group:</span>
		<button data-model="lineAndarcAndcircle">arc+line+circle</button>
		<button data-model="lineAndcircleAndsectors">line+circle+sectors</button>
		<a href="./simgl/more.html">more...</a>
	</div>

	<div class="header">
		<canvas class="can"></canvas>
	</div>
</div>
</body>
<script type="text/javascript" src="./simglmodel/circle.js"></script>
<script type="text/javascript" src="./simglmodel/line.js"></script>
<script type="text/javascript" src="./simglmodel/arc.js"></script>
<script type="text/javascript" src="./simglmodel/rect.js"></script>
<script type="text/javascript" src="./simglmodel/wave.js"></script>
<script type="text/javascript" src="./simglmodel/sectors.js"></script>
<script type="text/javascript" src="./simglmodel/hat.js"></script>
<!-- group -->
<script type="text/javascript" src="./simglmodel/group.js"></script>
<!-- multi -->
<script type="text/javascript" src="./simglmodel/multi.js"></script>
<script type="text/javascript"> circle()</script>
<script type="text/javascript">
var all = document.querySelector('#mid').querySelectorAll("button");
for(var k = 0; k < all.length; k++ ){

	all[k].onclick = function  (e) {
		var pre = e.target.nextSibling;
		var c = e.target.nextSibling.parentNode.children;
		var allLen = c.length;

		var items = [];
		for(var d = 0; d < allLen; d++){
			items.push( c.item(d) );
			items[d].removeAttribute('class');
		}

		e.target.setAttribute('class','active');

		var getFoo = e.target.getAttribute("data-model");

		window[getFoo]()
	}
}
</script>
</html>
