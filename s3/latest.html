<html>  
<head>  
<meta charset='utf-8'>
<title>s3.JS</title>
<meta name="viewport" content="width=device-width, minimum-scale=1, initial-scale=1, user-scalable=yes">
<script src="./jquery-3.2.1.min.js"></script>
<script src="./S3/S3.js"></script>
<link rel="stylesheet" type="text/css" href="./assets/public.css">
<style type="text/css">
	body{background: #111;}
	a{color: blanchedalmond}
	div:first-child.top-none{padding: 0;padding-top:2px;background: #111;}
	.bgwhite{background-color: white}
	.bgred{background-color: white}
	.header,.center{text-align: center;}
	.header canvas{margin: 0 auto;width:960px;height: 500px}
	.main .header{overflow: hidden;width: 100%;}
	.main .mid{width:960px;margin:0 auto;text-align: left;padding: 5px;background: #222}
	.main .mid button{background: #222;color: gray;border: navajowhite;}
	.main .mid .active{color:#ddd;}
	.main .mid .config{color: #aaa;font-size: 12px;}
	.center{margin: 0 auto;color: #eee}
	div[att='config'] button,
	div[att='config'] span,.sideLink{background: none;color: #ddd;border: none;margin-left:5px;font-size: 12px;cursor:pointer;padding: 0}
	div[att='config'] span a{color: #dfdfdf;text-decoration: none;}
	.sideLink,.config{float: right;padding-right: 10px;text-align: left;}
	.config select,.config{position:relative;}
	.config {display: inline-block;width: auto;}
	.config select{width: auto;height: 22px;margin-right: 10px;background: #333;color: #aaa;border: none;}
	#worker.worker.self{position: absolute;bottom: 0;padding: 0;width: 100%;text-align: center;color: #333;background: #000;}
	.clear{display: none;float: right;color: #666}
	@media (max-width: 768px){.main .mid{width: 100%;padding: 0;}.config{display: none;}div{padding-left: 0;padding-right: 0} }
</style>
</head>
<body>
<div class="top-none">
	<div class="top-none"></div>
	<div att="config">
		<div class="top-none"></div>
		<!-- <span>开始</span> -->
		<!-- data-model="start" -->
		<!-- <span>停止</span> -->
		<!-- data-model="stop" -->
		<span class="center pixmid">s3.js</span>
		<a class="sideLink" href="https://github.com/koringz/s3">latest Version</a>
	</div>
</div>
<div class="main">
	<div id="mid" class="mid">
		<button data-model="hill" class="active">hill</button>
		<button data-model="moveWave">moveWave</button>
		<button data-model="moveCircle">moveCircle</button>
		<span class="clear">hill仅pc视角</span>

		<span class="config select1"><em>Dir:</em>
			<select class="menuBar" data-item="direction">
				<option>top</option>
				<option>bottom</option>
				<option>left</option>
				<option>right</option>
			</select>
		</span>
		<span class="config select2"><em>X:</em>
			<select class="menuBar" data-item="x">
				<option>50</option>
				<option>150</option>
				<option>250</option>
				<option>350</option>
				<option>450</option>
				<option>550</option>
				<option>650</option>
				<option>750</option>
				<option>850</option>
			</select>
		</span>
		<span class="config select2"><em>Y:</em>
			<select class="menuBar" data-item="y">
				<option>50</option>
				<option>150</option>
				<option>250</option>
				<option>350</option>
				<option>450</option>
			</select>
		</span>
		<span class="config select2"><em>Scale:</em>
			<select class="menuBar" data-item="trails">
				<option>1</option>
				<option>5</option>
				<option>10</option>
				<option>15</option>
				<option>20</option>
				<option>25</option>
				<option>30</option>
				<option>35</option>
			</select>
		</span>
		<span class="config select2"><em>Smooth:</em>
			<select class="menuBar" data-item="smooth">
				<option>1</option>
				<option>5</option>
				<option>10</option>
				<option>15</option>
				<option>20</option>
				<option>25</option>
				<option>30</option>
				<option>35</option>
			</select>
		</span>
		<span class="config select2"><em>Color:</em>
			<select class="menuBar" data-item="index">
				<option data-color="rgba(0,0,0,1)">黑色</option>
				<option data-color="rgba(214,39,42,1)">红色</option>
				<option data-color="rgba(246,189,15,1)">黄色</option>
				<option data-color="rgba(8,139,209,1)">蓝色</option>
				<!-- <option>绿色</option> -->
				<!-- <option>紫色</option> -->
			</select>
		</span>
	</div>

	<div class="header">
		<canvas id="lineId"></canvas>
	</div>
</div>
<div id="worker" class="worker self top-none">auther: <span>koringz</span></div>
</body>
<script type="text/javascript" src="./compenent/simglmodel/moveCircle.js"></script>
<script type="text/javascript" src="./compenent/simglmodel/moveWave.js"></script>
<script type="text/javascript" src="./compenent/simglmodel/hill.js"></script>
<script type="text/javascript" src="./main.js"></script>
</html>
