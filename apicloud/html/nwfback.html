<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
    <meta name="viewport" content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <meta name=”viewport” content=”width=device-width, initial-scale=1″>
    <meta name="format-detection" content="telephone=no,email=no,date=no,address=no">
    <title>内务府</title>
    <link rel="stylesheet" type="text/css" href="../css/api.css"/>
    <link rel="stylesheet" type="text/css" href="../css/common.css" />
    <link rel="stylesheet" type="text/css" href="../css/nwf.css">
    <script type="text/javascript" src="../script/jquery-1.7.2.min.js"></script>
    <script type="text/javascript" src="../script/jquery.lazyload.min.js"></script>
</head>
<body>
	<div id="wrap">
        <div id="header" data-original="../image/index/header_bg.jpg">
            <a class="goback" href="main.html" onclick="goback()" data-original="../image/index/goback.png"></a>
            <a class="header_title">内务府</a>
            <a class="more" href="more.html" onclick="goback()">
                <span></span>
                <span></span>
                <span></span>
            </a>
        </div>

            <script>
            $(function () {
                $('.header,.goback').lazyload({effect:'fadeIn',threshold : 200})
            })
            </script>

        <div id="main" data-original="../image/index/bg.jpg">
            <ul class="user_info">
                <li class="user_face_name">
                    <span class="user_face"></span>
                    <span class="user_name">韦小宝</span>
                </li>
                <li class="user_lv">身份：平民</li>
                <li class="user_paytype">发薪类型：日薪</li>
            </ul>
            <div class="banner"><img class="lazy" data-original="../image/nwf/banner.jpg" width="100%" height="100%"></div>
            <ul class="earning_nwf">
                <li class="accumulate_earning" onclick="location.href='trade.html'">
                    <p id="total"></p>
                    <i>已累积领取薪水</i>
                </li>
                <li class="earning_rank">
                    <p></p>
                    <i>薪水排行榜</i>
                </li>
            </ul>
            <div class="usable_earning">
                <p id="withdrawals"></p>
                <i>当前可领薪水</i>
            </div>
            <ul class="get_draw">
                <li class="get_btn" style="margin-top:1rem">
                    <a class="show_suc" data-original="../image/nwf/get_btn.png"></a>
                </li>
            </ul>
        </div>

        <script>
        $(function () {
            $('.main,.lazy,.show_suc').lazyload({effect:'fadeIn',threshold : 200})
        })
        </script>





        <div class="pay_success">
            <span class="success_icon"></span>
            <p style="font-size: 1.4rem; text-align: center; margin-bottom: 1.4rem;">您确定提交申请吗？</p>
            <p style="text-align: center;" id="pay_success_time"></p>
            <ul class="pay_account_detial">
                <li><span>支付方式：</span><span>微信</span></li>
                <li><span>金额：</span><span id="pay_success_withdrawals"></span></li>
            </ul>
            <label for="shareto"><input type="checkbox" name="" id="shareto" checked="checked"> 朋友圈嘚瑟一下，领取薪水</label>
            <ul class="pay_prompt">
                <li><button class="pay_sure"></button></li>
                <li><button class="pay_cancle"></button></li>
            </ul>
        </div>



    </div>



    <!-- 支付绑定 -->
    <div class="box for_pay_account hide">
        <span class="box_head for_pay_account_head">绑定微信账户<span class="close_for_pay_account" onclick="$('.for_pay_account').addClass('hide');$('.get_draw a').css('visibility','visible');"></span></span>
        <form name="pay_account">
            <ul class="for_account_con">
                <span class="wzf" style="margin-top:3rem">
                    <input type="text" id="wzf_user_name" placeholder="请输入您的真实姓名" style="margin-bottom:2rem">
                    <input type="text" id="wzf_mobile_input" class="mobile_input" placeholder="请输入您的手机号">
                    <input type="text" name="security" id="wzf_security" placeholder="请输入6位验证码"><input type="button" id="wzf_security_btn">
                </span>
            </ul>
            <button type="button" class="complete"></button>
        </form>
        <span class="close"></span>
    </div>
    <!-- 支付绑定 -->



    <script type="text/javascript" src="../script/autoscale.js"></script>
    <script type="text/javascript" src="../script/interface.js"></script>
    <script type="text/javascript" src="../script/api.js"></script>
<!-- <script type="text/javascript" src="../script/nwfback.js"></script> -->
</body>
</html>
