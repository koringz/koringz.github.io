<script>
$(document).ready(function () {

        u = navigator.userAgent,
        isAndroid = u.indexOf('Android') > -1 || u.indexOf('Linux') > -1;
        if(isAndroid){

            swss.eq(2).find('img').attr('src',"image/first_in33.jpg");
            swss.eq(3).find('img').attr('src',"image/first_in44.jpg");
        }
        return false;
});
</script>
