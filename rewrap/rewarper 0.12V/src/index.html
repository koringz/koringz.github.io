<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,minimum-scale=1,maximum-scale=1,initial-scale=1,user-scalable=no" />
	<meta name="format-detection" content="telephone=no" />
	<title>ajax</title>
	<script type="text/javascript" src="./../lib/wrap.js"></script>
</head>
<body>
	<div class="all">
		<center class="c_middle"></center>
	</div>
</body>
<script>

// 2、POST：定義請求參數

// wajax.js
wrap.service('ajax',function ajax() {

    // 定义请求参数
    var getOption = {
        ajaxType: "GET",
        urlStr: "rewrap/query.do",
        data: null
    }

    // 注册方法
    this.register = function() {
        return ['ask','list']
    }

    // 管道class类的方法 同时获得methods内部的指定class方法
    // 然后在其他的方法(例success)内部通过props管道注册的方法调用class的内部元素的的属性
    // 通过调用方法内部的属性 即可执行class类的方法 
    // 注意 此class类的element元素必须是被定义过的元素 否则不可调用
    // 也就是说 只能调用父元素的this绑定过的元素
    this.props = function (){
        return {
            state: [{class:'.all', head:'.header', content:'.content'}]
        }
    }

    // 绑定方法
    // 为指定的节点绑定一个或多个方法
    // 如下
    // .all节点具有 add 和 remove 方法 ---表示追加指定class 与 移除指定class
    // .header节点具有 add 方法  ---表示追加指定class
    // .content节点具有 push 和 has 方法  ---表示追加HTML 与 是否含有指定class
    this.methods = function  ($scope) {
        this.$scope.state

        this.addClass = function ( $scope.state.class, aclass ){
            this.el = state.class
            this.el['add'](aclass)
            return this
        }
        this.removeClass = function ( $scope.state.node, aclass ){
            this.el = state.node
            this.el.remove(aclass)
            return this
        }
        this.addClass = function ( $scope.state.head, aclass ){
            this.el = state.head
            this.el.add(aclass)
            return this
        }
        this.pushHtml = function ( $scope.state.content, html ){
            this.el = state.content
            this.el.push(html)
            return this
        }
        this.hasClass = function ( $scope.state.content, html ){
            this.el = state.content
            this.el.has(html)
            return this
        }
    }

    // 监听方法
    // 如果上面的公用的方法绑定了指定的节点 就能监听到
    // 自动添加这个节点的数据到指定的方法里面去
    this.watch = function($scope){
        return {
            ask: function  ($scope.state.content) {
                this.hasClass($scope.state.content)
                this.pushHtml($scope.state.content)
                this.addClass($scope.state.content)
            },
            list: function  ($scope.state.head) {
                this.hasClass($scope.state.head)
                this.pushHtml($scope.state.head)
                this.addClass($scope.state.head)
            }
        }
    }

    const _this = this

    // 支持大小写
    this.URL = getOption.urlStr
    this.TYPE = getOption.ajaxType
    this.SUCCESS = function( data ) {
        var val = data
        console.log(val)

        if(val === 'dataCalss') _this.$props.state.$el('.base').remove('show')
        else _this.$props.state.$el(state.class).add('hide')

        _this.$props.state.$el(state.content).push(data)
    }
    this.ERROR = function(err) {
        console.log(err)
    }

})

</script>
</html>
